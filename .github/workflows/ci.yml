name: LoopLens CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Rust CLI and demo app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/demo-app/package-lock.json

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Install demo app dependencies
        run: npm --prefix examples/demo-app ci

      - name: Build demo app
        run: npm --prefix examples/demo-app run build

